name: 🤖 Daily Autonomous Agent

on:
  schedule:
    # Run daily at 12:34 UTC
    - cron: "34 12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

jobs:
  autonomous-run:
    name: "Autonomous Run"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Run Autonomous Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x agent-core/scripts/autonomous-agent.py
          python3 agent-core/scripts/autonomous-agent.py 2>&1 | tee /tmp/agent-output.txt
          # Extract selected model from output
          grep "Selected model:" /tmp/agent-output.txt | awk '{print $NF}' > /tmp/selected-model.txt || true

      - name: Update Diary Index
        run: |
          # Simple script to update index.html with new diary links
          DIARY_LIST=""
          for f in $(ls -r docs/diary/*.md); do
            DATE=$(basename $f .md)
            DIARY_LIST="$DIARY_LIST<li class='diary-item'><a href='index.html?report=$DATE'>$DATE - Daily Report</a></li>"
          done

          # Replace the placeholder in index.html
          # Use a unique placeholder to avoid repeated sed issues
          # Note: We use @ as delimiter to avoid issues with / in HTML
          sed -i "s@<!-- Diary entries will be auto-generated here -->@$DIARY_LIST@" docs/index.html

      - name: Commit & Push Changes
        run: |
          if [ -f /tmp/selected-model.txt ] && [ -s /tmp/selected-model.txt ]; then
            SELECTED_MODEL=$(cat /tmp/selected-model.txt)
            MODEL_NAME=$(echo "$SELECTED_MODEL" | tr '/' '-')
          else
            MODEL_NAME="autonomous-agent"
          fi

          git config user.name "$MODEL_NAME (Autonomous Agent)"
          git config user.email "$MODEL_NAME@autonomousorg.com"

          git add PLANS.md TASKS.md docs/diary/*.md docs/index.html

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "🤖 $MODEL_NAME: Daily Autonomous Task ($(date +%Y-%m-%d))"
          git push
